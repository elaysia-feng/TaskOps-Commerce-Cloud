server:
  port: 8080

spring:
  cloud:
    sentinel:
      transport:
        dashboard: ${TASKOPS_SENTINEL_DASHBOARD:localhost:8858}
        port: ${TASKOPS_SENTINEL_CLIENT_PORT:8722}
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: task-service
          uri: lb://task-service
          predicates:
            - Path=/api/tasks/**
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/admin/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
        - id: pay-service
          uri: lb://pay-service
          predicates:
            - Path=/api/pay/**

app:
  jwt:
    secret: ${TASKOPS_JWT_SECRET:1234567890123456789012345678901234567890}
