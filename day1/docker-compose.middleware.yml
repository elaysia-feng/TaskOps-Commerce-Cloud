version: "3.9"
services:
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: taskops-nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      JVM_XMS: 256m
      JVM_XMX: 256m
    ports:
      - "8848:8848"

  mysql:
    image: mysql:8.0
    container_name: taskops-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ../sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: taskops-redis
    ports:
      - "6379:6379"

