spring:
  application:
    name: pay-service
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:${TASKOPS_MW_HOST:192.168.88.100}:8848}
      discovery:
        namespace: ${NACOS_NAMESPACE:public}
      config:
        namespace: ${NACOS_NAMESPACE:public}
        file-extension: yaml
  config:
    import:
      - optional:nacos:${spring.application.name}.yaml
