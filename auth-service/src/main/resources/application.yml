server:
  port: 8081

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${TASKOPS_DB_URL:jdbc:mysql://${TASKOPS_MW_HOST:192.168.88.100}:3307/internship_taskops?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${TASKOPS_DB_USER:root}
    password: ${TASKOPS_DB_PASS:root}
  redis:
    host: ${TASKOPS_REDIS_HOST:${TASKOPS_MW_HOST:192.168.88.100}}
    port: ${TASKOPS_REDIS_PORT:6380}
  session:
    store-type: redis
  cloud:
    sentinel:
      transport:
        dashboard: ${TASKOPS_SENTINEL_DASHBOARD:${TASKOPS_MW_HOST:192.168.88.100}:8858}
        port: ${TASKOPS_SENTINEL_CLIENT_PORT:8719}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: ${TASKOPS_JWT_SECRET:1234567890123456789012345678901234567890}
    expire-ms: ${TASKOPS_JWT_EXPIRE:86400000}
