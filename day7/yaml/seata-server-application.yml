server:
  port: ${SEATA_SERVER_PORT:7091}

spring:
  application:
    name: seata-server

seata:
  config:
    type: nacos
    nacos:
      server-addr: ${NACOS_ADDR:${TASKOPS_MW_HOST:192.168.88.100}:8848}
      namespace: ${NACOS_NAMESPACE:public}
      group: SEATA_GROUP
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      data-id: seataServer.properties
  registry:
    type: nacos
    nacos:
      application: seata-server
      server-addr: ${NACOS_ADDR:${TASKOPS_MW_HOST:192.168.88.100}:8848}
      namespace: ${NACOS_NAMESPACE:public}
      group: SEATA_GROUP
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      cluster: default
  store:
    mode: db
    db:
      datasource: druid
      db-type: mysql
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: ${SEATA_DB_URL:jdbc:mysql://${TASKOPS_MW_HOST:192.168.88.100}:3307/taskops_seata?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
      user: ${TASKOPS_DB_USER:root}
      password: ${TASKOPS_DB_PASS:root}
      min-conn: 5
      max-conn: 30
      global-table: global_table
      branch-table: branch_table
      lock-table: lock_table
      distributed-lock-table: distributed_lock
      query-limit: 100
      max-wait: 5000
  security:
    secret-key: ${SEATA_SECRET_KEY:SeataSecretKey0123456789}
    token-validity-in-milliseconds: 1800000
  console:
    user:
      username: ${SEATA_CONSOLE_USER:seata}
      password: ${SEATA_CONSOLE_PASS:seata}

