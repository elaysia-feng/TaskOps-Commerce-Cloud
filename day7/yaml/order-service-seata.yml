server:
  port: 8084

spring:
  application:
    name: order-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${TASKOPS_DB_URL:jdbc:mysql://${TASKOPS_MW_HOST:192.168.88.100}:3307/taskops_order?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${TASKOPS_DB_USER:root}
    password: ${TASKOPS_DB_PASS:root}
  redis:
    host: ${TASKOPS_REDIS_HOST:${TASKOPS_MW_HOST:192.168.88.100}}
    port: ${TASKOPS_REDIS_PORT:6380}
  cloud:
    sentinel:
      transport:
        dashboard: ${TASKOPS_SENTINEL_DASHBOARD:localhost:8858}
        port: ${TASKOPS_SENTINEL_CLIENT_PORT:8723}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: taskops_tx_group
  enable-auto-data-source-proxy: true
  data-source-proxy-mode: AT
  service:
    vgroup-mapping:
      taskops_tx_group: default
    grouplist:
      default: ${SEATA_SERVER_ADDR:${TASKOPS_MW_HOST:192.168.88.100}:8091}
  registry:
    type: nacos
    nacos:
      application: seata-server
      server-addr: ${NACOS_ADDR:${TASKOPS_MW_HOST:192.168.88.100}:8848}
      namespace: ${NACOS_NAMESPACE:public}
      group: SEATA_GROUP
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
  config:
    type: nacos
    nacos:
      server-addr: ${NACOS_ADDR:${TASKOPS_MW_HOST:192.168.88.100}:8848}
      namespace: ${NACOS_NAMESPACE:public}
      group: SEATA_GROUP
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}

